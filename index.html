<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heart Love</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:black;
      overflow:hidden;
      width:100vw;
      height:100vh;

      display:flex;
      justify-content:center;
      align-items:center;

      font-family:Arial, sans-serif;
    }

    .container{
      position:relative;
      width:100vw;
      height:100vh;
    }

    .love{
      position:absolute;

      color:#ff4da6;

      font-size:18px;
      font-weight:bold;

      white-space:nowrap;
      user-select:none;

      text-shadow:
      0 0 5px #ff4da6,
      0 0 10px #ff4da6,
      0 0 20px #ff4da6,
      0 0 40px #ff4da6;

      animation:pulse 2s infinite;
    }

    @keyframes pulse{

      0%{
        transform:scale(1);
        opacity:0.8;
      }

      50%{
        transform:scale(1.08);
        opacity:1;
      }

      100%{
        transform:scale(1);
        opacity:0.8;
      }

    }

  </style>
</head>

<body>

  <div class="container" id="heart"></div>

  <script>

    const container = document.getElementById("heart");

    // quantidade de textos
    const total = 90;

    // centro da tela
    const centerX = window.innerWidth / 2;
    const centerY = window.innerHeight / 2;

    // tamanho do coração
    const scale = Math.min(window.innerWidth, window.innerHeight) / 38;

    for(let i = 0; i < total; i++){

      const text = document.createElement("div");

      text.className = "love";
      text.innerHTML = "I love you";

      // fórmula do coração
      const t = Math.PI * 2 * i / total;

      const x = 16 * Math.pow(Math.sin(t), 3);

      const y =
      13 * Math.cos(t)
      - 5 * Math.cos(2 * t)
      - 2 * Math.cos(3 * t)
      - Math.cos(4 * t);

      // posição centralizada
      const posX = x * scale + centerX;
      const posY = -y * scale + centerY;

      text.style.left = `${posX}px`;
      text.style.top = `${posY}px`;

      // delay aleatório
      text.style.animationDelay = `${Math.random() * 2}s`;

      container.appendChild(text);

    }

  </script>

</body>
</html>
