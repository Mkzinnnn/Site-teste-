<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Sorteio Inteligente</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
    }

    .container {
      background: white;
      padding: 40px;
      border-radius: 15px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      color: #666;
    }

    button {
      margin-top: 20px;
      padding: 12px 25px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: #4facfe;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #007bff;
    }

    #numero {
      font-size: 50px;
      margin-top: 30px;
      font-weight: bold;
      color: #333;
    }

    #contador {
      margin-top: 15px;
      font-size: 14px;
      color: #888;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Sorteio 🎲</h1>
    <p>Clique para sortear um número</p>

    <button onclick="sortear()">Sortear</button>

    <div id="numero">?</div>
    <div id="contador">Sorteios: 0</div>
  </div>

  <script>
    let quantidadeSorteios = 0;

    function animarNumero(finalNumero) {
      let contador = 0;
      let intervalo = setInterval(() => {
        document.getElementById("numero").innerText = Math.floor(Math.random() * 100);
        contador++;

        if (contador > 15) {
          clearInterval(intervalo);
          document.getElementById("numero").innerText = finalNumero;
        }
      }, 50);
    }

    function sortear() {
      quantidadeSorteios++;

      let numeroFinal;

      if (quantidadeSorteios <= 2) {
        numeroFinal = 27;
      } else {
        numeroFinal = Math.floor(Math.random() * 100) + 1;
      }

      animarNumero(numeroFinal);

      document.getElementById("contador").innerText =
        "Sorteios: " + quantidadeSorteios;
    }
  </script>

</body>
</html>
